# Build the emulator for Windows, Linux and macOS.
#
# PyInstaller cannot cross-compile, so each OS builds itself on its own runner --
# that is the whole reason this exists: GitHub hands us the three machines we do
# not have locally. Each job does the same four things: build the C++ core with
# CMake, install the Python deps, run the tests, then package with PyInstaller.
#
# Triggers:
#   * push of a tag like v2.1  -> builds AND attaches the three artefacts to a
#     GitHub Release
#   * the "Run workflow" button -> builds and uploads artefacts you can download
#     from the run page (no release). Use this to try a build without tagging.
#
# Nothing here signs the macOS app: an unsigned .app runs, but Gatekeeper warns on
# first launch (right-click > Open to bypass). Signing needs a paid Apple Developer
# account and is a later step -- see the notes at the bottom.

name: build

on:
  workflow_dispatch:        # the manual "Run workflow" button
  push:
    tags:
      - 'v*'                # v2.1, v2.1.0, ...

permissions:
  contents: write           # needed to create a Release on a tag

jobs:
  build:
    strategy:
      fail-fast: false      # one OS failing must not cancel the other two
      matrix:
        include:
          - os: windows-latest
            artifact: NgpCraftEmulator-windows
            binary: dist/NgpCraftEmulator.exe
          - os: ubuntu-latest
            artifact: NgpCraftEmulator-linux
            binary: dist/NgpCraftEmulator
          - os: macos-latest
            artifact: NgpCraftEmulator-macos
            binary: dist/NgpCraftEmulator.app

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'      # matches the local toolchain; floor is 3.10

      # Linux runners are headless and ship almost none of the shared libraries Qt
      # links. PyQt6.QtGui needs EGL/GL/xkbcommon/dbus even under the offscreen
      # platform, and PyQt6.QtMultimedia (imported for audio in ngpc_shell.py)
      # links libpulse -- without it, importing the module fails at collection
      # with "libpulse.so.0: cannot open shared object file". Windows/macOS bundle
      # their own audio stack, so this step is Linux-only.
      - name: Install system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libpulse0 libpulse-mainloop-glib0

      # Build the native core. CMake picks each platform's own compiler (MSVC on
      # Windows, GCC on Linux, Clang on macOS); the CMakeLists already handles the
      # runtime-linking differences.
      - name: Build the C++ core
        run: |
          cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Release
          cmake --build cpp/build --config Release

      # MSVC drops the .dll in a Release/ subfolder; the spec expects it directly
      # under cpp/build/ (where the MinGW build already puts it). Move it if needed.
      - name: Normalise the core location (Windows MSVC)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          if [ -f cpp/build/Release/ngpc_core.dll ]; then
            mv cpp/build/Release/ngpc_core.dll cpp/build/ngpc_core.dll
          fi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pyinstaller

      # The suite runs headless everywhere (QT_QPA_PLATFORM=offscreen is set by the
      # tests themselves). A red suite must stop the build -- shipping a broken
      # binary is worse than shipping none.
      - name: Run the tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

      - name: Package with PyInstaller
        run: pyinstaller --noconfirm --clean NgpCraftEmulator.spec

      - name: Upload the build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error

  # On a tag, gather the three artefacts into one GitHub Release.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish the release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
